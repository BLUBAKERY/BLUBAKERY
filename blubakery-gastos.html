<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blu Bakery">
<meta name="mobile-web-app-capable" content="yes">
<title>Blu Bakery — Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fff9e5;
    --cream-2: #faf6ea;
    --navy: #004e64;
    --navy-dark: #003647;
    --brown: #6b4423;
    --border: #e8e0c8;
    --muted: #6b6657;
    --danger: #c0392b;
    --success: #2c7a4b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--navy-dark);
    font-family: 'Lato', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--navy);
    margin: 0;
    letter-spacing: -.5px;
  }
  header .sub {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .15em;
    margin-top: 4px;
  }
  .status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .status.ok { color: var(--success); }
  .status.err { color: var(--danger); }

  /* Cajas (saldos) */
  .cajas {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }
  .caja-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .caja-card .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
  }
  .caja-card .saldo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    margin-top: 4px;
  }
  .caja-card.efectivo .saldo { color: var(--brown); }

  /* Pagador tabs */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
    margin: 0 0 10px;
  }
  .pagadores {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .pag-btn {
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    font-family: 'Lato', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--navy-dark);
    cursor: pointer;
    transition: all .15s;
  }
  .pag-btn.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .pag-btn.blu.active {
    background: var(--brown);
    border-color: var(--brown);
  }

  /* Form */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    background: var(--cream-2);
    color: var(--navy-dark);
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--navy);
    background: white;
  }
  .row {
    display: grid;
    gap: 10px;
  }
  .row.cols-2 { grid-template-columns: 1fr 1fr; }
  .row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  /* Cantidad helper */
  .qty-helper {
    background: var(--cream-2);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-top: 6px;
    font-size: 13px;
    color: var(--muted);
  }
  .qty-helper b { color: var(--navy); }

  /* Caja origen (solo si Blu) */
  #cajaSection { display: none; }
  #cajaSection.active { display: block; }
  .caja-options {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .caja-opt {
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all .15s;
  }
  .caja-opt.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  #splitFields { display: none; margin-top: 10px; }
  #splitFields.active { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  #splitWarn {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--danger);
    text-align: center;
    margin-top: 4px;
    min-height: 16px;
  }

  /* Save button */
  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: .08em;
    cursor: pointer;
    margin-top: 6px;
  }
  .save-btn:disabled {
    opacity: .5;
    cursor: not-allowed;
  }
  .save-btn:not(:disabled):hover { background: var(--navy-dark); }

  /* Lista de gastos */
  .gasto-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .gasto-item .info { flex: 1; }
  .gasto-item .desc { font-weight: 600; font-size: 14px; }
  .gasto-item .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .gasto-item .monto {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--navy);
    white-space: nowrap;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px 12px;
  }

  /* Totales */
  .totales {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .total-card {
    background: var(--cream-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .total-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
  .total-card .val { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; color: var(--navy); margin-top: 2px; }
  .total-card.total { background: var(--navy); }
  .total-card.total .lbl { color: rgba(255,255,255,.7); }
  .total-card.total .val { color: white; }

  .planilla-link {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--navy);
    text-decoration: none;
  }
  .planilla-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Blu Bakery</h1>
    <div class="sub">Gastos</div>
  </header>

  <div id="status" class="status">Conectando…</div>

  <!-- Saldos de cajas -->
  <div class="cajas">
    <div class="caja-card efectivo">
      <div class="label">💵 Efectivo</div>
      <div class="saldo" id="saldoEfectivo">—</div>
    </div>
    <div class="caja-card">
      <div class="label">🏦 Banco</div>
      <div class="saldo" id="saldoBanco">—</div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <h2 class="section-title">Nuevo gasto</h2>

    <label>Pagador</label>
    <div class="pagadores">
      <button class="pag-btn" data-pag="July">July</button>
      <button class="pag-btn" data-pag="Joa">Joa</button>
      <button class="pag-btn blu" data-pag="Blu">Blu</button>
    </div>

    <label>Producto / descripción</label>
    <input type="text" id="desc" placeholder="Ej: Harina 0000">

    <div class="row cols-3">
      <div>
        <label>Cantidad</label>
        <input type="number" id="cantidad" step="0.01" placeholder="1" value="1">
      </div>
      <div>
        <label>Formato</label>
        <input type="text" id="formato" placeholder="1kg / 250g / unid.">
      </div>
      <div>
        <label>Precio unit.</label>
        <input type="number" id="precioUnitario" step="0.01" placeholder="0">
      </div>
    </div>

    <div class="qty-helper" id="qtyHelper">
      Total: <b id="totalCalc">$0</b>
    </div>

    <label>Gasto total ($)</label>
    <input type="number" id="monto" step="0.01" placeholder="0">

    <label>Fecha</label>
    <input type="date" id="fecha">

    <label>Categoría</label>
    <select id="categoria">
      <option value="Insumos — Olavarría">Insumos — Olavarría</option>
      <option value="Insumos — BsAs / envío">Insumos — BsAs / envío</option>
      <option value="Packaging">Packaging</option>
      <option value="Logística / delivery">Logística / delivery</option>
      <option value="Marketing / contenido">Marketing / contenido</option>
      <option value="Traslados">Traslados</option>
      <option value="Otro">Otro</option>
    </select>

    <label>Proveedor (opcional)</label>
    <input type="text" id="proveedor" placeholder="Ej: Aguila, Tía Isabel">

    <label>Notas (opcional)</label>
    <textarea id="notas" rows="2" placeholder=""></textarea>

    <!-- Caja origen (solo aparece si pagador = Blu) -->
    <div id="cajaSection">
      <label>Caja origen</label>
      <div class="caja-options">
        <div class="caja-opt" data-caja="Efectivo">💵 Efectivo</div>
        <div class="caja-opt" data-caja="Banco">🏦 Banco</div>
        <div class="caja-opt" data-caja="Split">⚡ Dividido</div>
      </div>

      <div id="splitFields">
        <div>
          <label>Efectivo ($)</label>
          <input type="number" id="montoEfectivo" step="0.01" placeholder="0">
        </div>
        <div>
          <label>Banco ($)</label>
          <input type="number" id="montoBanco" step="0.01" placeholder="0">
        </div>
        <div id="splitWarn"></div>
      </div>
    </div>

    <button class="save-btn" id="btnGuardar" disabled>Guardar gasto</button>
  </div>

  <!-- Lista de gastos de la sesión -->
  <div class="card">
    <h2 class="section-title">Gastos de esta sesión</h2>
    <div id="lista">
      <div class="empty">Todavía no hay gastos en esta sesión.</div>
    </div>

    <div class="totales">
      <div class="total-card total">
        <div class="lbl">Total</div>
        <div class="val" id="tTotal">$0</div>
      </div>
      <div class="total-card">
        <div class="lbl">July</div>
        <div class="val" id="tJuly">$0</div>
      </div>
      <div class="total-card">
        <div class="lbl">Joa</div>
        <div class="val" id="tJoa">$0</div>
      </div>
      <div class="total-card">
        <div class="lbl">Blu</div>
        <div class="val" id="tBlu">$0</div>
      </div>
    </div>

    <a class="planilla-link" href="https://docs.google.com/spreadsheets/d/1Aj0dEaukdl1moh9oKhIMzZdhS_P1Fraemaen15wjDyI/edit" target="_blank">Ver planilla →</a>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxsUwYu8_MF5aRY_KB5zd8onLolRwJhigaFsNX5xezFQYNrBVhqlY-6yo-jzMweOZVX/exec";

let pagadorSel = null;
let cajaSel = null;
let gastosSesion = [];

const $ = (id) => document.getElementById(id);
const status = $("status");

// Setear fecha de hoy
(function setHoy(){
  const d = new Date();
  $("fecha").value = d.toISOString().split("T")[0];
})();

// === Saldos ===
async function cargarSaldos() {
  try {
    const r = await fetch(APPS_SCRIPT_URL + "?accion=saldos");
    const d = await r.json();
    if (d.status === "ok" && d.saldos) {
      $("saldoEfectivo").textContent = formatPesos(d.saldos.Efectivo || 0);
      $("saldoBanco").textContent = formatPesos(d.saldos.Banco || 0);
      status.textContent = "Conectado a Blu Bakery";
      status.className = "status ok";
    } else {
      throw new Error("respuesta invalida");
    }
  } catch (e) {
    $("saldoEfectivo").textContent = "—";
    $("saldoBanco").textContent = "—";
    status.textContent = "No se pudo conectar (los gastos igual se guardan)";
    status.className = "status err";
  }
}
cargarSaldos();

function formatPesos(n) {
  return "$" + Math.round(n).toLocaleString("es-AR");
}

// === Pagador ===
document.querySelectorAll(".pag-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".pag-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    pagadorSel = btn.dataset.pag;
    if (pagadorSel === "Blu") {
      $("cajaSection").classList.add("active");
    } else {
      $("cajaSection").classList.remove("active");
      cajaSel = null;
      document.querySelectorAll(".caja-opt").forEach(o => o.classList.remove("active"));
      $("splitFields").classList.remove("active");
    }
    validar();
  });
});

// === Caja origen ===
document.querySelectorAll(".caja-opt").forEach(opt => {
  opt.addEventListener("click", () => {
    document.querySelectorAll(".caja-opt").forEach(o => o.classList.remove("active"));
    opt.classList.add("active");
    cajaSel = opt.dataset.caja;
    if (cajaSel === "Split") {
      $("splitFields").classList.add("active");
    } else {
      $("splitFields").classList.remove("active");
    }
    validar();
  });
});

// === Cálculo automático del total a partir de cantidad x precio ===
function recalcularTotal() {
  const cant = parseFloat($("cantidad").value) || 0;
  const pu = parseFloat($("precioUnitario").value) || 0;
  if (cant > 0 && pu > 0) {
    const total = cant * pu;
    $("totalCalc").textContent = formatPesos(total);
    // Solo autocomplete el monto si está vacío o coincide
    if (!$("monto").value || parseFloat($("monto").value) === 0) {
      $("monto").value = total;
    }
  } else {
    $("totalCalc").textContent = "$0";
  }
  validar();
}
["cantidad","precioUnitario","monto"].forEach(id => {
  $(id).addEventListener("input", recalcularTotal);
});

// === Split validation ===
["montoEfectivo","montoBanco","monto"].forEach(id => {
  $(id).addEventListener("input", () => {
    if (cajaSel === "Split") {
      const efec = parseFloat($("montoEfectivo").value) || 0;
      const banco = parseFloat($("montoBanco").value) || 0;
      const total = parseFloat($("monto").value) || 0;
      const suma = efec + banco;
      const w = $("splitWarn");
      if (Math.abs(suma - total) > 0.01 && total > 0) {
        w.textContent = `⚠ La suma (${formatPesos(suma)}) no coincide con el total (${formatPesos(total)})`;
      } else {
        w.textContent = "";
      }
    }
    validar();
  });
});

// === Validación general ===
function validar() {
  const ok = pagadorSel && $("desc").value.trim() && parseFloat($("monto").value) > 0 && $("fecha").value;
  let cajaOk = true;
  if (pagadorSel === "Blu") {
    if (!cajaSel) cajaOk = false;
    else if (cajaSel === "Split") {
      const efec = parseFloat($("montoEfectivo").value) || 0;
      const banco = parseFloat($("montoBanco").value) || 0;
      const total = parseFloat($("monto").value) || 0;
      if (Math.abs((efec + banco) - total) > 0.01 || total === 0) cajaOk = false;
    }
  }
  $("btnGuardar").disabled = !(ok && cajaOk);
}
$("desc").addEventListener("input", validar);
$("fecha").addEventListener("input", validar);

// === Guardar ===
$("btnGuardar").addEventListener("click", async () => {
  $("btnGuardar").disabled = true;
  $("btnGuardar").textContent = "Guardando…";

  const monto = parseFloat($("monto").value) || 0;
  const payload = {
    tipo: "gasto",
    fecha: $("fecha").value,
    quien: pagadorSel,
    desc: $("desc").value.trim(),
    monto: monto,
    cat: $("categoria").value,
    proveedor: $("proveedor").value.trim(),
    notas: $("notas").value.trim(),
    cantidad: $("cantidad").value || "",
    formato: $("formato").value.trim(),
    precio_unitario: $("precioUnitario").value || "",
    caja_origen: pagadorSel === "Blu" ? cajaSel : "",
    monto_efectivo: (pagadorSel === "Blu" && cajaSel === "Split") ? parseFloat($("montoEfectivo").value) || 0 : (pagadorSel === "Blu" && cajaSel === "Efectivo" ? monto : ""),
    monto_banco: (pagadorSel === "Blu" && cajaSel === "Split") ? parseFloat($("montoBanco").value) || 0 : (pagadorSel === "Blu" && cajaSel === "Banco" ? monto : "")
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
    // Agregar a la lista local
    gastosSesion.unshift(payload);
    renderLista();
    limpiarForm();
    // Refrescar saldos si fue Blu
    if (payload.quien === "Blu") {
      setTimeout(cargarSaldos, 1500);
    }
    status.textContent = "✓ Gasto guardado";
    status.className = "status ok";
  } catch (err) {
    status.textContent = "Error al guardar: " + err.message;
    status.className = "status err";
  }
  $("btnGuardar").textContent = "Guardar gasto";
  validar();
});

function limpiarForm() {
  $("desc").value = "";
  $("cantidad").value = "1";
  $("formato").value = "";
  $("precioUnitario").value = "";
  $("monto").value = "";
  $("proveedor").value = "";
  $("notas").value = "";
  $("montoEfectivo").value = "";
  $("montoBanco").value = "";
  $("totalCalc").textContent = "$0";
  $("splitWarn").textContent = "";
  cajaSel = null;
  document.querySelectorAll(".caja-opt").forEach(o => o.classList.remove("active"));
  $("splitFields").classList.remove("active");
}

function renderLista() {
  const lista = $("lista");
  if (gastosSesion.length === 0) {
    lista.innerHTML = '<div class="empty">Todavía no hay gastos en esta sesión.</div>';
  } else {
    lista.innerHTML = gastosSesion.map(g => {
      const cantFormato = g.cantidad && g.formato ? `${g.cantidad} × ${g.formato} · ` : "";
      const cajaInfo = g.quien === "Blu" && g.caja_origen ? ` · ${g.caja_origen === "Split" ? "Efec+Banco" : g.caja_origen}` : "";
      return `<div class="gasto-item">
        <div class="info">
          <div class="desc">${escapeHtml(g.desc)}</div>
          <div class="meta">${cantFormato}${escapeHtml(g.quien)} · ${escapeHtml(g.cat)}${cajaInfo}</div>
        </div>
        <div class="monto">${formatPesos(g.monto)}</div>
      </div>`;
    }).join("");
  }
  // Totales
  let tot = 0, july = 0, joa = 0, blu = 0;
  gastosSesion.forEach(g => {
    tot += g.monto;
    if (g.quien === "July") july += g.monto;
    else if (g.quien === "Joa") joa += g.monto;
    else if (g.quien === "Blu") blu += g.monto;
  });
  $("tTotal").textContent = formatPesos(tot);
  $("tJuly").textContent = formatPesos(july);
  $("tJoa").textContent = formatPesos(joa);
  $("tBlu").textContent = formatPesos(blu);
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
</script>
</body>
</html>
