<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#F3EBDD">
<title>Blu Bakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #004e64;
    --crema: #F3EBDD;
    --crema-card: #FBF6EC;
    --avena: #E7DAC8;
    --lavanda: #D9CCE7;
    --bordo: #7E1F2D;
    --mostaza: #D7A13A;
    --tinta: #1d2b30;
    --gris: #8a8478;
    --linea: #e3d6c2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--crema);
    color: var(--tinta);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body { overflow-x: hidden; }
  img { display: block; max-width: 100%; }

  .display { font-family: 'Bricolage Grotesque', sans-serif; }

  /* ===== HEADER ===== */
  .top {
    text-align: center;
    padding: 26px 16px 18px;
  }
  .top-logo {
    width: min(500px, 94%);
    height: auto;
    margin: 0 auto;
  }
  .top-logo-fallback {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--azul);
  }
  .top-links {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .top-links a {
    color: var(--azul);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .top-links svg { width: 15px; height: 15px; }

  /* ===== MARQUEE ===== */
  .marquee {
    background: var(--azul);
    color: var(--crema);
    overflow: hidden;
    white-space: nowrap;
    padding: 9px 0;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .marquee span {
    display: inline-block;
    animation: slide 22s linear infinite;
  }
  @keyframes slide {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee b { font-weight: 600; margin: 0 6px; color: var(--mostaza); }

  /* ===== APP WRAP ===== */
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 16px 70px;
  }

  .sec-head {
    margin: 34px 0 16px;
  }
  .sec-head .eyebrow {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--bordo);
  }
  .sec-head h2 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: var(--azul);
    line-height: 1.05;
    margin-top: 3px;
    letter-spacing: -.5px;
  }

  /* ===== COOKIE DEL MES ===== */
  .cdm {
    margin: 22px 0 8px;
    background: var(--bordo);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
  }
  .cdm-inner { padding: 22px 22px 24px; }
  .cdm-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.14);
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 13px;
    border-radius: 100px;
  }
  .cdm-tag .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--mostaza);
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .cdm-photo {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 16px;
    margin: 16px 0;
    background: #6a1a26;
  }
  .cdm h3 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 34px;
    color: #fff;
    line-height: 1;
    letter-spacing: -1px;
  }
  .cdm .cdm-desc {
    color: rgba(255,255,255,.82);
    font-size: 14px;
    margin-top: 8px;
    line-height: 1.45;
  }
  .cdm-buy {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    gap: 14px;
  }
  .cdm-price {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: #fff;
  }
  .cdm-btn {
    background: var(--crema);
    color: var(--bordo);
    border: none;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px 24px;
    border-radius: 100px;
    cursor: pointer;
    transition: transform .12s;
  }
  .cdm-btn:active { transform: scale(.95); }
  .cdm-btn.added { background: var(--mostaza); color: var(--azul); }

  /* ===== GRILLA COOKIES ===== */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .ck {
    background: var(--crema-card);
    border: 1px solid var(--linea);
    border-radius: 18px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .ck.out { opacity: .72; }
  .ck-imgwrap {
    position: relative;
    aspect-ratio: 1/1;
    overflow: hidden;
    background: var(--avena);
  }
  .ck-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .4s;
  }
  .ck:active .ck-img { transform: scale(1.05); }
  .ck-badge {
    position: absolute;
    top: 9px; left: 9px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    color: #fff;
  }
  .ck-badge.nueva { background: var(--azul); }
  .ck-badge.pocas { background: var(--bordo); }
  .ck-badge.agot { background: #6b6b6b; }
  .ck-body {
    padding: 12px 13px 14px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .ck-name {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--azul);
    line-height: 1.1;
    letter-spacing: -.3px;
  }
  .ck-desc {
    font-size: 11.5px;
    color: var(--gris);
    margin-top: 4px;
    line-height: 1.35;
    flex: 1;
  }
  .ck-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }
  .ck-price {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--tinta);
  }
  .add-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--azul);
    color: #fff;
    border: none;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform .1s;
  }
  .add-btn:active { transform: scale(.85); }
  .stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--azul);
    background: transparent;
    color: var(--azul);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .step-num {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 16px;
    min-width: 18px;
    text-align: center;
    color: var(--azul);
  }
  .avisar {
    width: 100%;
    background: transparent;
    border: 1.5px solid #6b6b6b;
    color: #555;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: 11.5px;
    padding: 9px;
    border-radius: 100px;
    cursor: pointer;
    margin-top: 8px;
  }

  /* ===== BOXES ===== */
  .box {
    background: var(--azul);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .box.lav { background: linear-gradient(135deg, #b9a7d4, var(--lavanda)); }
  .box-img {
    width: 96px; height: 96px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,.15);
  }
  .box-txt { flex: 1; min-width: 0; }
  .box-txt h3 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 19px;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -.3px;
  }
  .box.lav .box-txt h3 { color: var(--azul); }
  .box-sub {
    font-size: 12px;
    color: rgba(255,255,255,.75);
    margin-top: 2px;
  }
  .box.lav .box-sub { color: rgba(0,78,100,.7); }
  .box-price {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--mostaza);
    margin-top: 5px;
  }
  .box.lav .box-price { color: var(--bordo); }
  .box-especial {
    display: inline-block;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    background: rgba(255,255,255,.18);
    color: #fff;
    padding: 3px 8px;
    border-radius: 100px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .box.lav .box-especial { background: rgba(126,31,45,.15); color: var(--bordo); }
  .box .stepper .step-btn { border-color: rgba(255,255,255,.6); color: #fff; }
  .box .stepper .step-num { color: #fff; }
  .box.lav .stepper .step-btn { border-color: var(--azul); color: var(--azul); }
  .box.lav .stepper .step-num { color: var(--azul); }

  /* ===== PANELES ===== */
  .panel {
    background: var(--crema-card);
    border: 1px solid var(--linea);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .panel label {
    display: block;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gris);
    margin: 14px 0 6px;
  }
  .panel label:first-child { margin-top: 0; }
  input, textarea {
    width: 100%;
    padding: 13px;
    border: 1px solid var(--linea);
    border-radius: 11px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: #fff;
    color: var(--tinta);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--azul); }

  .pills { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Aviso destacado de envío gratis (Opción B - banner bordó) */
  .aviso-envio-gratis {
    background: var(--bordo);
    color: var(--crema);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 2px solid var(--mostaza);
    margin: 12px 0 4px;
    box-shadow: 0 3px 10px rgba(126,31,45,0.18);
  }
  .aeg-icon { font-size: 30px; flex-shrink: 0; line-height: 1; }
  .aeg-text { flex: 1; line-height: 1.3; }
  .aeg-top {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 19px;
    font-weight: 800;
    color: var(--mostaza);
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .aeg-bot { font-family: 'Bricolage Grotesque', sans-serif; font-size: 13px; color: var(--crema); margin-top: 4px; }
  .aeg-bot b { color: #fff; font-weight: 700; }
  @media (max-width: 520px){
    .aviso-envio-gratis { padding: 12px 14px; gap: 12px; }
    .aeg-icon { font-size: 26px; }
    .aeg-top { font-size: 17px; }
    .aeg-bot { font-size: 12.5px; }
  }

  /* === BOXES ESPECIALES (LANZAMIENTOS) === */
  .lanz-section { display: flex; flex-direction: column; gap: 18px; margin: 4px 0 24px; }

  .be-card {
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  /* --- Estilo PADRE (cupón vintage bordó + crema) --- */
  .be-padre {
    background: #FBF6EC;
    border: 2px solid #7E1F2D;
  }
  .be-padre .be-header {
    background: #7E1F2D;
    color: #FBF6EC;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .be-padre .be-mini {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: #D7A13A;
  }
  .be-padre .be-fecha-tag {
    background: #D7A13A;
    color: #7E1F2D;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .be-padre .be-titulo {
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--azul);
  }
  .be-padre .be-precio { color: #7E1F2D; }
  .be-padre .be-step-btn {
    background: #7E1F2D;
    color: #FBF6EC;
    border-color: #7E1F2D;
  }

  /* --- Estilo MUNDIAL (sol de mayo, celeste + crema) --- */
  .be-mundial {
    background: linear-gradient(180deg, #d9e9f5 0%, #f2e6d8 100%);
    border: 1.5px solid rgba(0,78,100,0.18);
  }
  .be-mundial .be-header {
    padding: 12px 18px 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .be-mundial .be-sol {
    width: 36px;
    height: 36px;
    opacity: 0.55;
  }
  .be-mundial .be-mini {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--azul);
  }
  .be-mundial .be-titulo {
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--azul);
  }
  .be-mundial .be-precio { color: var(--azul); }
  .be-mundial .be-step-btn {
    background: var(--azul);
    color: #fff;
    border-color: var(--azul);
  }
  .be-cintita {
    display: flex;
    gap: 3px;
    margin: 4px 0 12px;
  }
  .be-cintita span {
    flex: 1;
    height: 4px;
    border-radius: 2px;
  }
  .be-cintita span:nth-child(1){ background: #6CACE4; }
  .be-cintita span:nth-child(2){ background: #fff; border: 1px solid rgba(11,35,69,0.15); }
  .be-cintita span:nth-child(3){ background: #6CACE4; }

  /* Carrusel de fotos */
  .be-fotos-wrap {
    position: relative;
    overflow: hidden;
    background: #f2e6d8;
    height: 360px;
  }
  .be-track {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }
  .be-slide {
    flex: 0 0 100%;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #f2e6d8;
  }
  .be-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .be-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(11,35,69,0.18);
    cursor: pointer;
    transition: all .2s;
  }
  .be-dot.on {
    background: #fff;
    transform: scale(1.3);
  }

  /* Body */
  .be-body {
    padding: 18px 22px 20px;
  }
  .be-titulo {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .be-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--gris);
    margin-bottom: 12px;
  }
  .be-desc-larga {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.55;
    color: var(--tinta);
    background: rgba(255,255,255,0.55);
    padding: 12px 14px;
    border-radius: 10px;
    margin: 10px 0 12px;
  }
  .be-trf-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--azul);
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 6px 11px;
    border-radius: 8px;
    margin-bottom: 14px;
  }
  .be-precio-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed rgba(11,35,69,0.2);
  }
  .be-precio-block { line-height: 1; }
  .be-precio-mini {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gris);
    margin-bottom: 4px;
  }
  .be-precio {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
  }
  .be-stepper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    padding: 6px;
    border-radius: 12px;
    border: 1px solid rgba(11,35,69,0.12);
  }
  .be-step-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
  }
  .be-step-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .be-cant {
    min-width: 22px;
    text-align: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--azul);
  }
  .be-agotado {
    background: var(--gris);
    color: #fff;
    padding: 9px 16px;
    border-radius: 10px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  @media (max-width: 520px) {
    .be-fotos-wrap { height: 300px; }
    .be-body { padding: 16px 18px 18px; }
    .be-titulo { font-size: 21px; }
    .be-precio { font-size: 26px; }
  }

  /* Reseñas */
  .rv-track {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding: 6px 2px 14px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .rv-track::-webkit-scrollbar { height: 0; }
  .rv-card {
    flex: 0 0 78%;
    max-width: 320px;
    background: var(--crema-card);
    border: 1.5px solid rgba(0,78,100,0.12);
    border-radius: 14px;
    padding: 14px 16px;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  @media (min-width: 600px){
    .rv-card { flex: 0 0 320px; }
  }
  .rv-stars { color: var(--mostaza); letter-spacing: 1px; font-size: 15px; }
  .rv-text {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--azul);
    font-style: italic;
  }
  .rv-foot {
    font-size: 12px;
    color: rgba(0,78,100,0.7);
    border-top: 1px dashed rgba(0,78,100,0.18);
    padding-top: 8px;
    margin-top: auto;
  }
  .rv-foot b { color: var(--azul); }
  .rv-foot span { font-style: italic; }
  .pills-entrega .pill { flex: 1 1 calc(50% - 4px); min-width: 0; font-size: 13px; padding: 12px 6px; }
  @media (max-width: 520px){
    .pills-entrega { flex-direction: column; }

<script>
/* ===== CONFIG ===== */

  ]
};

/* ===== ESTADO ===== */
var qty = {}, boxQty = 0, box2Qty = 0, boxFill = {}, box2Fill = {};
var ent = null, diaId = null, franja = null, pago = null, disp = [];

function $(id){ return document.getElementById(id); }
function fmt(n){ return "$" + Math.round(n).toLocaleString("es-AR"); }
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g,function(c){

  });
}
function driveImg(v){

  }

}

/* ===== CARGAR CONFIG ===== */
(function(){
  fetch(CONFIG_GVIZ)
    .then(function(r){ return r.text(); })
    .then(function(t){
      var j = JSON.parse(t.substring(t.indexOf("{"), t.lastIndexOf("}")+1));
      if(j.table.rows.length && j.table.rows[0].c[0]){
        var d = JSON.parse(j.table.rows[0].c[0].v);
        Object.keys(d).forEach(function(k){
          if(d[k] !== undefined && d[k] !== null) CFG[k] = d[k];
        });

    .finally(function(){ init(); });
})();

function init(){
  CFG.productos.forEach(function(p){ qty[p.id] = 0; });

  $("marqueeText").innerHTML = mt + mt;
  render();
}

/* ===== RESEÑAS (lee la pestaña Reviews del Sheet) ===== */
function cargarReviews(){
  var sec = $("reviewsSec");
  if(!sec) return;
  fetch(REVIEWS_GVIZ)
    .then(function(r){ return r.text(); })
    .then(function(t){
      var j = JSON.parse(t.substring(t.indexOf("{"), t.lastIndexOf("}")+1));
      var rows = (j.table && j.table.rows) || [];
      // Columnas esperadas: Fecha · Hora · Nombre · Producto · Estrellas · Comentario · Origen
      var reviews = [];
      rows.forEach(function(row){
        if(!row || !row.c) return;
        var get = function(i){ return row.c[i] ? (row.c[i].f || row.c[i].v) : ""; };
        var nombre = (get(2)||"").toString().trim();
        var producto = (get(3)||"").toString().trim();
        var estrellas = parseInt(get(4)) || 0;
        var comentario = (get(5)||"").toString().trim();
        // Solo 4-5 estrellas, con comentario, con nombre
        if(estrellas >= 4 && comentario && nombre){
          reviews.push({ nombre: nombre, producto: producto, estrellas: estrellas, comentario: comentario });
        }
      });
      renderReviews(reviews);
    })
    .catch(function(e){ console.warn("Reviews:", e); });
}

function renderReviews(reviews){
  var sec = $("reviewsSec");
  if(!sec || !reviews.length) return;
  var spacer = '<div style="height:18px"></div>';
  var head = '<div class="sec-head"><div class="eyebrow">Reseñas</div><h2>La gente anda diciendo</h2></div>';

  var cards = reviews.map(function(r){
    var stars = "";
    for(var i=0;i<5;i++) stars += (i < r.estrellas ? '★' : '☆');
    return '<div class="rv-card">'+
      '<div class="rv-stars">'+stars+'</div>'+
      '<div class="rv-text">"'+esc(r.comentario)+'"</div>'+
      '<div class="rv-foot"><b>'+esc(r.nombre)+'</b>'+(r.producto?' · <span>'+esc(r.producto)+'</span>':'')+'</div>'+
    '</div>';
  }).join("");

  sec.innerHTML = spacer + head + '<div class="rv-track" id="rvTrack">'+cards+'</div>';

  // Auto-scroll: avanza una tarjeta cada 4.5s, vuelve al inicio al llegar al final
  var track = document.getElementById("rvTrack");
  if(!track || reviews.length < 2) return;
  var pausado = false;
  // Pausar al tocar/hover (para que el usuario pueda leer)
  track.addEventListener("mouseenter", function(){ pausado = true; });
  track.addEventListener("mouseleave", function(){ pausado = false; });
  track.addEventListener("touchstart", function(){ pausado = true; }, {passive:true});
  track.addEventListener("touchend", function(){ setTimeout(function(){ pausado = false; }, 2500); }, {passive:true});

  setInterval(function(){
    if(pausado) return;
    var card = track.querySelector(".rv-card");
    if(!card) return;
    var stepWidth = card.offsetWidth + 12; // ancho de tarjeta + gap
    var maxScroll = track.scrollWidth - track.clientWidth;
    if(track.scrollLeft + stepWidth >= maxScroll - 4){
      track.scrollTo({ left: 0, behavior: "smooth" });
    } else {
      track.scrollBy({ left: stepWidth, behavior: "smooth" });
    }
  }, 4500);
}

/* ===== RENDER ===== */
function render(){
  var app = $("app");
  app.innerHTML = "";

  // LANZAMIENTOS / BOXES ESPECIALES (arriba de todo)
  var lanzamientos = (CFG.boxesEspeciales || [])

    .sort(function(a,b){ return (a.orden||0) - (b.orden||0); });

    lanzWrap.className = "lanz-section";

  if(CFG.mostrarCDM !== false){
    var cdm = CFG.productos.find(function(p){ return p.id === CFG.cookieDelMes && p.activo; });
    if(cdm) app.appendChild(renderCDM(cdm));

  // COOKIES

  app.appendChild(secHead("Tus datos", "¿Quién pide?"));

  // PAGO
  app.appendChild(secHead("Pago", "¿Cómo abonás?"));
  app.appendChild(renderPago());

  // CTA Confirmar
  var cta = document.createElement("button");
  cta.className = "cta"; cta.id = "btnGo"; cta.textContent = "Confirmar pedido";
  cta.onclick = confirmar;
  app.appendChild(cta);

  // NOVEDADES + EVENTOS + CONTACTO (con aire arriba)

  app.appendChild(spacer);
  app.appendChild(renderNov());
  app.appendChild(renderEventos());
  app.appendChild(renderContacto());

  // RESEÑAS (lee de la pestaña Reviews del Sheet)

  var fe = document.createElement("div");

  renderDias();
  renderResumen();
  iniciarCarrusel();
}

function secHead(eyebrow, titulo){

/* ===== COOKIE DEL MES ===== */
/* ===== BOX ESPECIAL (LANZAMIENTO) ===== */
function renderBoxEspecial(b, idx){
  var d = document.createElement("div");
  // Detectar estilo por palabras clave del nombre
  var nombre = String(b.nombre||"").toLowerCase();
  var esMundial = nombre.includes("mundial");
  var esPadre = nombre.includes("padre") || nombre.includes("papá") || nombre.includes("papa");
  // Default: estilo padre (cupón bordó). Si tiene "mundial" en el nombre → estilo mundial.
  var estilo = esMundial ? "mundial" : "padre";

// Carrusel simple para cada box especial (auto-play + dots clickeables + swipe)
function iniciarCarruselBE(id){
  var track = document.getElementById("beTrack-"+id);
  if(!track) return;
  var wrap = track.parentElement;
  var dots = wrap.querySelectorAll(".be-dot");
  var slides = track.querySelectorAll(".be-slide");
  var n = slides.length;
  if(n < 2) return;
  var idx = 0;
  var moverA = function(i){
    idx = (i+n) % n;
    track.style.transform = "translateX(-"+(idx*100)+"%)";
    dots.forEach(function(d,j){ d.classList.toggle("on", j===idx); });
  };
  dots.forEach(function(d, j){
    d.addEventListener("click", function(){ moverA(j); pausa = true; });
  });
  // swipe
  var startX = 0, dx = 0;
  track.addEventListener("touchstart", function(e){ startX = e.touches[0].clientX; dx = 0; pausa = true; }, {passive:true});
  track.addEventListener("touchmove", function(e){ dx = e.touches[0].clientX - startX; }, {passive:true});
  track.addEventListener("touchend", function(){
    if(Math.abs(dx) > 40) moverA(idx + (dx < 0 ? 1 : -1));
    setTimeout(function(){ pausa = false; }, 3000);
  }, {passive:true});
  // auto
  var pausa = false;
  setInterval(function(){ if(!pausa) moverA(idx+1); }, 5000);
}

function dispo(id){

  return (parseInt(p.stock)||0) - (boxFill[id]||0) - (box2Fill[id]||0);

function chCookie(id, delta){

/* ===== MODAL ===== */
function openModal(tipo){
  var box = tipo==="box" ? CFG.box : CFG.box2;
  window._mt = tipo; window._mb = box; window._mf = {};
  CFG.productos.forEach(function(p){ window._mf[p.id]=0; });
  $("mTitle").textContent = "Armá tu " + box.nombre;
  $("mSub").textContent = "Elegí " + box.cant + " cookies (podés repetir)";
  $("mMax").textContent = box.cant;
  $("mCount").textContent = "0";
  var list = $("mList");
  list.innerHTML = "";
  CFG.productos.forEach(function(p){
    if(!p.activo) return;
    var r = document.createElement("div");
    r.className = "srow";
    r.innerHTML =
      '<img src="'+driveImg(p.foto)+'" onerror="this.style.opacity=.3">' +
      '<span class="sn">'+esc(p.nombre)+'</span>' +
      '<div class="stepper">' +
        '<button class="step-btn" onclick="mSabor(\''+p.id+'\',-1)">−</button>' +
        '<span class="step-num" id="ms-'+p.id+'">0</span>' +
        '<button class="step-btn" onclick="mSabor(\''+p.id+'\',1)">+</button>' +
      '</div>';
    list.appendChild(r);
  });
  $("mbg").classList.add("show");
}
function mSabor(id, delta){
  var box = window._mb, f = window._mf;
  var tot = 0; Object.keys(f).forEach(function(k){ tot+=f[k]; });
  if(delta>0){
    if(tot >= box.cant){ toast("Ya elegiste "+box.cant); return; }
    var p = CFG.productos.find(function(x){ return x.id===id; });
    var usado = (qty[id]||0)+(boxFill[id]||0)+(box2Fill[id]||0)+f[id];
    if(usado >= (parseInt(p.stock)||0)){ toast("Sin stock de "+p.nombre); return; }
    f[id]++;
  } else if(f[id]>0){ f[id]--; }
  $("ms-"+id).textContent = f[id];
  var nt = 0; Object.keys(f).forEach(function(k){ nt+=f[k]; });
  $("mCount").textContent = nt;
}
$("mConfirm").onclick = function(){
  var box = window._mb, f = window._mf, tipo = window._mt;
  var tot = 0; Object.keys(f).forEach(function(k){ tot+=f[k]; });
  if(tot !== box.cant){ toast("Elegí exactamente "+box.cant+" cookies"); return; }
  if(tipo==="box"){
    boxQty++;
    Object.keys(f).forEach(function(k){ boxFill[k]=(boxFill[k]||0)+f[k]; });
    $("bn-box").textContent = boxQty;
  } else {
    box2Qty++;
    Object.keys(f).forEach(function(k){ box2Fill[k]=(box2Fill[k]||0)+f[k]; });
    $("bn-box2").textContent = box2Qty;
  }
  closeModal();
  renderResumen();
  toast("Box agregada ✓");
};
function closeModal(){ $("mbg").classList.remove("show"); }

/* ===== DÍAS ===== */
function renderDias(){
  var wrap = $("diaSec");
  if(!wrap) return;
  wrap.innerHTML = "";
  if(!CFG.diasEntrega.length) return;
  wrap.appendChild(secHead("Día", "¿Cuándo lo querés?"));

  var now = new Date();
  var minH = CFG.horasCorte || 24;
  function parseFecha(d){
    var mf = (d.label||"").match(/(\d{1,2})\/(\d{1,2})/);
    if(!mf) return null;
    var hs = (d.horario || (d.franjas&&d.franjas[0]) || "15:00");
    var mh = hs.match(/(\d{1,2})[:.]?(\d{0,2})/);
    var f = new Date(now.getFullYear(), parseInt(mf[2])-1, parseInt(mf[1]),
                     mh?parseInt(mh[1]):15, (mh&&mh[2])?parseInt(mh[2]):0, 0);
    if(f < now && (now.getMonth()-(parseInt(mf[2])-1) > 6))
      f = new Date(now.getFullYear()+1, parseInt(mf[2])-1, parseInt(mf[1]), 15, 0, 0);
    return f;
  }
  disp = CFG.diasEntrega.map(function(d){
    var f = parseFecha(d);
    if(!f) return { dia:d, ok:true };
    return { dia:d, ok: (f-now)/3600000 >= minH };
  });
  var oks = disp.filter(function(x){ return x.ok; });
  if(!oks.length){
    var w = document.createElement("div");
    w.className = "warn";
    w.textContent = "⚠ Los días disponibles ya cerraron (mínimo "+minH+"hs de anticipación). Volvé cuando carguemos nuevas fechas.";
    wrap.appendChild(w);
  }
  var row = document.createElement("div");
  row.className = "pills";
  disp.forEach(function(it){
    var b = document.createElement("button");
    if(it.ok){
      b.className = "pill"; b.id = "d-"+it.dia.id;
      b.textContent = it.dia.label;
      b.onclick = (function(id){ return function(){ setDia(id); }; })(it.dia.id);
    } else {
      b.className = "pill off";
      b.textContent = it.dia.label + " · cerrado";
      b.onclick = function(){ toast("Ese día ya cerró. Mínimo "+minH+"hs antes."); };
    }
    row.appendChild(b);
  });
  wrap.appendChild(row);
  if(oks.length){
    diaId = oks[0].dia.id;
    var fb = $("d-"+diaId); if(fb) fb.classList.add("on");
    renderFranjas();
  } else {
    diaId = null;
    $("frSec").innerHTML = "";
  }
}
function setDia(id){
  diaId = id;
  disp.forEach(function(it){
    if(it.ok){ var b = $("d-"+it.dia.id); if(b) b.classList.toggle("on", it.dia.id===id); }
  });
  renderFranjas();
}
function renderFranjas(){
  var wrap = $("frSec");
  if(!wrap) return;
  wrap.innerHTML = "";
  var d = CFG.diasEntrega.find(function(x){ return x.id===diaId; });
  var fr = [];
  if(d && d.franjas && d.franjas.length) fr = d.franjas;
  else if(d && d.horario) fr = [d.horario];
  else fr = CFG.franjasDefault || [];
  if(!fr.length){ franja = null; return; }
  wrap.appendChild(secHead("Horario", "¿A qué hora?"));
  var row = document.createElement("div");
  row.className = "pills";
  fr.forEach(function(f, i){
    var b = document.createElement("button");
    b.className = "pill" + (i===0?" on":"");
    b.textContent = f;
    b.onclick = (function(val, el){
      return function(){
        row.querySelectorAll(".pill").forEach(function(x){ x.classList.remove("on"); });
        el.classList.add("on"); franja = val;
      };
    })(f, b);
    row.appendChild(b);
  });
  wrap.appendChild(row);
  franja = fr[0];
}

var carruselTimer;
function iniciarCarrusel(){
  clearInterval(carruselTimer);
  var slides = document.querySelectorAll(".nov-slide");
  var dots = document.querySelectorAll(".nov-dot");
  if(slides.length <= 1) return;
  var actual = 0;
  carruselTimer = setInterval(function(){
    slides[actual].classList.remove("active");
    dots[actual].classList.remove("on");
    actual = (actual + 1) % slides.length;
    slides[actual].classList.add("active");
    dots[actual].classList.add("on");
  }, 3200);
}

/* ===== RESUMEN ===== */
function totales(){
  var sueltas = 0, items = [];
  CFG.productos.forEach(function(p){
    if(qty[p.id]>0){
      sueltas += qty[p.id]*p.precio;
      items.push({ nombre:p.nombre, cant:qty[p.id] });
    }
  });
  var boxes = boxQty*(CFG.box.precio||0) + box2Qty*(CFG.box2.precio||0);
  var hayBox = (boxQty+box2Qty)>0;
  var pct = CFG.box.pctSueltas||0;
  var desc = (hayBox && pct>0) ? sueltas*(pct/100) : 0;

  // Boxes especiales
  var bEsp = 0, itemsBE = [], requiereTrf = false;
  (CFG.boxesEspeciales || []).forEach(function(b){
    var c = beQty[b.id] || 0;
    if(c > 0){
      bEsp += c * (b.precio || 0);
      itemsBE.push({ id:b.id, nombre:b.nombre, cant:c, precio:b.precio||0 });
      if(b.soloTransferencia) requiereTrf = true;
    }
  });

  var hayAlgo = hayBox || items.length>0 || itemsBE.length>0;
  return {
    sueltas:sueltas, boxes:boxes, desc:desc,
    bEsp:bEsp, itemsBE:itemsBE, requiereTrf:requiereTrf,
    total: boxes + sueltas - desc + bEsp,
    items:items, hayBox:hayBox, hayAlgo:hayAlgo
  };
}
function renderResumen(){
  var wrap = $("resSec");
  if(!wrap) return;
  var t = totales();
  var hay = t.hayAlgo;
  var h = '<div class="panel">';
  if(!hay){
    h += '<div class="res-empty">Todavía no elegiste cookies</div>';
  } else {
    // Boxes especiales arriba (son lanzamiento, llaman atención)
    t.itemsBE.forEach(function(it){
      h += row(it.nombre + " ×" + it.cant, fmt(it.cant * it.precio));
    });
    if(boxQty>0){
      h += row(CFG.box.nombre+" ×"+boxQty, fmt(boxQty*CFG.box.precio));
      h += fillDet(boxFill);
    }
    if(box2Qty>0){
      h += row(CFG.box2.nombre+" ×"+box2Qty, fmt(box2Qty*CFG.box2.precio));
      h += fillDet(box2Fill);
    }
    t.items.forEach(function(it){ h += row(it.nombre+" ×"+it.cant, ""); });
    if(t.desc>0) h += row("Descuento sueltas ("+CFG.box.pctSueltas+"%)", "−"+fmt(t.desc));
    h += '<div class="res-total"><span>Total</span><span>'+fmt(t.total)+'</span></div>';

    // Aviso de pago obligatorio por transferencia
    if(t.requiereTrf){
      h += '<div style="background:#eaf2f4;border:1px solid var(--azul);border-radius:10px;padding:9px 12px;margin-top:10px;font-size:12.5px;color:var(--azul);line-height:1.45"><b>💳 Reserva solo por transferencia.</b> Esta box se reserva pagando por transferencia. Tu reserva se confirma cuando recibimos el comprobante.</div>';
    }

    if(ent==="envio"){
      var umbral = parseInt(CFG.envioGratisDesde) || 0;
      var gratis = umbral > 0 && t.total >= umbral;
      if(gratis){
        h += '<div style="background:#eaf5ed;border:1px solid #4E6546;border-radius:10px;padding:9px 12px;margin-top:8px;font-size:13px;color:#3a4f36;font-weight:600">🎉 ¡Tenés envío gratis!</div>';
      } else if(umbral > 0){
        var falta = umbral - t.total;
        h += '<div style="background:#fbeede;border:1px solid var(--mostaza);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:12.5px;color:#8a5a14">🚚 Te faltan <b>'+fmt(falta)+'</b> para el envío gratis</div>';
        h += '<div style="font-size:12px;color:var(--gris);margin-top:6px">+ Envío '+fmt(CFG.costoEnvio)+' (se abona al recibir)</div>';
      } else {
        h += '<div style="font-size:12px;color:var(--gris);margin-top:8px">+ Envío '+fmt(CFG.costoEnvio)+' (se abona al recibir)</div>';
      }
    }
  }
  h += '</div>';
  wrap.innerHTML = h;

  // Forzar transferencia si hay box especial que la requiere
  aplicarReglaTransferencia(t.requiereTrf);

  var btn = $("btnGo");
  if(btn) btn.disabled = !hay;
}

// Si hay box especial que requiere transferencia: deshabilita efectivo y selecciona transferencia automáticamente
function aplicarReglaTransferencia(requiere){
  var btnEf = $("pEfec");
  var btnTr = $("pTransf");
  if(!btnEf || !btnTr) return;
  if(requiere){
    if(pago === "efectivo"){
      // Cambiar automáticamente a transferencia
      pago = "transferencia";
      btnEf.classList.remove("on");
      btnTr.classList.add("on");
    }
    btnEf.disabled = true;
    btnEf.style.opacity = "0.4";
    btnEf.style.cursor = "not-allowed";
    btnEf.title = "Esta box es solo por transferencia";
  } else {
    btnEf.disabled = false;
    btnEf.style.opacity = "";
    btnEf.style.cursor = "";
    btnEf.title = "";
  }
}
function row(l, v){ return '<div class="res-row"><span>'+esc(l)+'</span><span>'+v+'</span></div>'; }
function fillDet(f){
  var ps = [];
  Object.keys(f).forEach(function(k){
    if(f[k]>0){
      var p = CFG.productos.find(function(x){ return x.id===k; });
      if(p) ps.push(f[k]+" "+p.nombre);
    }
  });
  return ps.length ? '<div class="res-sub">↳ '+esc(ps.join(" · "))+'</div>' : "";
}

/* ===== CONFIRMAR ===== */
function confirmar(){
  var t = totales();
  if(!t.hayAlgo){ toast("Elegí al menos una cookie"); return; }
  var nom = $("iNom").value.trim(), tel = $("iTel").value.trim();
  if(!nom){ toast("Completá tu nombre"); return; }
  if(!tel){ toast("Completá tu teléfono"); return; }
  if(!ent){ toast("Elegí envío o retiro"); return; }
  if(ent==="retiro" && !puntoRetiro){ toast("Elegí dónde retirar"); return; }
  if(ent==="envio" && !$("iDir").value.trim()){ toast("Completá la dirección"); return; }
  if(!diaId){ toast("Elegí un día"); return; }
  if(!pago){ toast("Elegí forma de pago"); return; }
  // Si hay box que requiere transferencia y eligió efectivo, no debería pasar (ya forzamos antes), pero por las dudas:
  if(t.requiereTrf && pago !== "transferencia"){
    toast("Esta box es solo por transferencia");
    return;
  }

  var dia = CFG.diasEntrega.find(function(d){ return d.id===diaId; });
  var ck = [];
  // Boxes especiales primero
  t.itemsBE.forEach(function(it){
    ck.push(it.nombre + " x" + it.cant);
  });
  if(boxQty>0){
    var bf = [];
    Object.keys(boxFill).forEach(function(k){
      if(boxFill[k]>0){ var p=CFG.productos.find(function(x){return x.id===k;}); if(p) bf.push(boxFill[k]+" "+p.nombre); }
    });
    ck.push(CFG.box.nombre+" x"+boxQty+" ("+bf.join(" + ")+")");
  }
  if(box2Qty>0){
    var bf2 = [];
    Object.keys(box2Fill).forEach(function(k){
      if(box2Fill[k]>0){ var p=CFG.productos.find(function(x){return x.id===k;}); if(p) bf2.push(box2Fill[k]+" "+p.nombre); }
    });
    ck.push(CFG.box2.nombre+" x"+box2Qty+" ("+bf2.join(" + ")+")");
  }
  CFG.productos.forEach(function(p){ if(qty[p.id]>0) ck.push(p.nombre+" x"+qty[p.id]); });

  var unidades = boxQty*CFG.box.cant + box2Qty*CFG.box2.cant;
  CFG.productos.forEach(function(p){ unidades += qty[p.id]||0; });

  var stockChanges = {};
  CFG.productos.forEach(function(p){
    var u = (qty[p.id]||0)+(boxFill[p.id]||0)+(box2Fill[p.id]||0);
    if(u>0) stockChanges[p.id] = u;
  });
  // Stock de boxes especiales (clave: be_<id>)
  t.itemsBE.forEach(function(it){ stockChanges["be_"+it.id] = it.cant; });

  var packTxt = [];
  if(boxQty>0) packTxt.push("Box4 x"+boxQty);
  if(box2Qty>0) packTxt.push("Box6 x"+box2Qty);
  t.itemsBE.forEach(function(it){ packTxt.push(it.nombre+" x"+it.cant); });

  var payload = {
    tipo:"pedido", fecha:hoy(), hora:hora(), nro_orden:"",
    nombre:nom, telefono:tel, email:$("iMail").value.trim(),
    cookies:ck.join(" | "), unidades:unidades,
    pack: packTxt.length?packTxt.join(", "):"No",
    subtotal:t.total, entrega: ent==="envio"?"Envio":"Retiro",
    direccion: ent==="envio" ? $("iDir").value.trim() : (puntoRetiro==="lomanegra" ? "Retiro Loma Negra" : "Retiro Olavarría"),
    dia_entrega: dia?dia.label:"", horario: franja||"",
    costo_envio: (function(){
      if(ent!=="envio") return 0;
      var umbral = parseInt(CFG.envioGratisDesde) || 0;
      if(umbral > 0 && t.total >= umbral) return 0;
      return CFG.costoEnvio;
    })(),
    total:t.total, pago: pago==="transferencia"?"Transferencia":"Efectivo",
    notas:$("iNotas").value.trim(), estado:"Pendiente",
    stockChanges:stockChanges,
    esReserva: t.requiereTrf  // marca el pedido como reserva especial
  };

  var btn = $("btnGo");
  btn.disabled = true;
  btn.textContent = "Enviando…";
  fetch(APPS_SCRIPT_URL, {
    method:"POST", mode:"no-cors",
    headers:{ "Content-Type":"text/plain;charset=utf-8" },
    body:JSON.stringify(payload)
  }).then(function(){ exito(payload); }).catch(function(){ exito(payload); });
}
function exito(p){
  // Armar mensaje pre-cargado para WhatsApp con TODA la info
  var lineas = [
    "Hola Blu Bakery! 🍪",
    "",
    "Hice un pedido a través de la web:",
    "",
    "📋 Pedido: " + p.cookies,
    "💰 Total: " + fmt(p.total),
    "👤 Nombre: " + p.nombre,
    "📞 Tel: " + p.telefono,
    "📅 " + p.entrega + ": " + p.dia_entrega + " " + p.horario,
    "🏠 " + p.direccion,
    "💳 Pago: " + p.pago
  ];
  if(p.pago === "Transferencia"){
    lineas.push("");

  }
  var msg = lineas.join("\n");

  // Es reserva especial si el pedido marca esReserva (box con soloTransferencia)
  var esReserva = !!p.esReserva;
  var esTransf = p.pago === "Transferencia";

  // Bloque de info de pago (solo si es transferencia)
  var bloquePago = "";
  if(esTransf){
    var alias = CFG.alias || "BLU.BAKERY";
    var banco = CFG.banco || "Banco Galicia";
    bloquePago =
      '<div style="background:#FBF6EC;border:1px dashed var(--azul);border-radius:12px;padding:14px 16px;margin:14px 0;text-align:left">' +
        '<div style="font-family:Bricolage Grotesque,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--azul);font-weight:700;margin-bottom:8px">Datos para transferir</div>' +
        '<div style="font-size:13.5px;color:var(--tinta);line-height:1.7">' +
          '<b>Monto:</b> '+fmt(p.total)+'<br>' +
          '<b>Alias:</b> '+esc(alias)+'<br>' +
          '<b>Banco:</b> '+esc(banco)+
        '</div>' +
      '</div>';
  }

  // Bloque rojo/destacado si es RESERVA (box con soloTransferencia)
  var bloqueReserva = esReserva ?
    '<div style="background:#7E1F2D;color:#FBF6EC;border-radius:12px;padding:14px 16px;margin:14px 0;text-align:left">' +
      '<div style="font-family:Bricolage Grotesque,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#D7A13A;font-weight:700;margin-bottom:6px">⚠️ Importante</div>' +
      '<div style="font-size:13.5px;line-height:1.55">Tu reserva <b>se confirma cuando recibimos el comprobante de transferencia</b>. Hasta ese momento, la box no queda apartada.</div>' +
    '</div>'
    : "";

  // Resumen de info del pedido (siempre)
  var infoPedido =
    '<div style="background:#fff;border:1px solid rgba(0,78,100,0.15);border-radius:12px;padding:16px;margin:14px 0;text-align:left">' +
      '<div style="font-family:Bricolage Grotesque,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--azul);font-weight:700;margin-bottom:10px">Tu reserva</div>' +
      '<div style="font-size:13.5px;color:var(--tinta);line-height:1.7">' +
        '<b>Pedido:</b> '+esc(p.cookies)+'<br>' +
        '<b>Total:</b> '+fmt(p.total)+'<br>' +
        '<b>Entrega:</b> '+esc(p.entrega)+' · '+esc(p.dia_entrega)+' '+esc(p.horario)+'<br>' +
        '<b>'+(p.entrega==="Envio"?"Dirección":"Punto")+':</b> '+esc(p.direccion)+'<br>' +
        '<b>Pago:</b> '+esc(p.pago)+
      '</div>' +
    '</div>';

  // Mensaje de qué sigue
  var queSigue =
    '<div style="background:#eaf2f4;border-radius:12px;padding:14px 16px;margin:14px 0;text-align:left">' +
      '<div style="font-family:Bricolage Grotesque,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--azul);font-weight:700;margin-bottom:6px">¿Qué sigue?</div>' +
      '<div style="font-size:13px;color:var(--tinta);line-height:1.6">' +
        'Te vamos a contactar por WhatsApp para coordinar los detalles' +
        (p.entrega==="Envio" ? '. <b>Si elegiste envío</b>, lo coordinamos con anticipación para acordar la dirección exacta y el horario.' : ' del retiro.') +
        (esTransf ? ' <b>Mandanos el comprobante</b> de transferencia para confirmar tu pedido — usá el botón de abajo.' : '') +
      '</div>' +
    '</div>';

  var ctaTexto = esTransf ? "📲 Enviar comprobante por WhatsApp" : "📲 Confirmar por WhatsApp";

  $("app").innerHTML =
    '<div class="panel" style="text-align:center;padding:32px 22px;margin-top:20px;max-width:560px;margin-left:auto;margin-right:auto">' +
      '<div style="font-size:48px">🍪</div>' +
      '<h2 class="display" style="color:var(--azul);font-size:28px;margin:10px 0 4px;font-weight:800">¡Pedido recibido!</h2>' +
      '<p style="color:var(--gris);font-size:14px;margin-bottom:8px">Gracias '+esc(p.nombre)+' 💛</p>' +
      bloqueReserva +
      infoPedido +
      bloquePago +
      queSigue +
      '<a class="fbtn" style="background:#25D366;color:#fff;display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:14px 24px;border-radius:100px;font-family:Bricolage Grotesque,sans-serif;font-weight:700;font-size:14.5px;text-decoration:none;box-shadow:0 4px 12px rgba(37,211,102,0.25)" href="https://wa.me/'+WSP+'?text='+encodeURIComponent(msg)+'" target="_blank" rel="noopener">'+ctaTexto+'</a>' +

}

/* ===== HELPERS ===== */
function hoy(){ var d=new Date(); return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear(); }
function hora(){
  var d=new Date(), h=d.getHours(), m=("0"+d.getMinutes()).slice(-2);
  var ap=h>=12?"p. m.":"a. m.", h12=h%12; if(h12===0) h12=12;
  return ("0"+h12).slice(-2)+":"+m+" "+ap;
}
var tmr;
function toast(msg){
  var el=$("toast");
  el.textContent=msg;
  el.classList.add("show");
  clearTimeout(tmr);
  tmr=setTimeout(function(){ el.classList.remove("show"); }, 2600);
}
