<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#004e64">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Blu Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #004e64;
    --navy-deep: #0B2345;
    --petrol: #12354A;
    --cream: #F3EBDD;
    --cream-2: #E7DAC8;
    --mostaza: #D7A13A;
    --bordo: #7E1F2D;
    --terracota: #B85D45;
    --oliva: #4E6546;
    --lavanda: #D9CCE7;
    --perla: #CFCBC7;
    --ink: #1a1a1a;
    --muted: #7a7466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--cream);
    color: var(--petrol);
    font-family: 'Jost', sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body { overflow-x: hidden; }

  /* ====== HEADER ====== */
  .hdr {
    text-align: center;
    padding: 30px 20px 18px;
    position: relative;
  }
  .hdr-logo {
    width: 130px; height: auto;
    margin: 0 auto 6px;
    display: block;
  }
  .hdr h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 4px;
    color: var(--navy);
    line-height: 1;
  }
  .hdr .slogan {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 15px;
    color: var(--terracota);
    margin-top: 6px;
  }
  .hdr .madein {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .hdr .madein::before,
  .hdr .madein::after {
    content: "";
    width: 22px; height: 1px;
    background: var(--mostaza);
  }
  .hdr-social {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .hdr-social a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--navy);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  .hdr-social svg { width: 17px; height: 17px; }

  /* ====== APP ====== */
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 25px;
    color: var(--navy);
    margin: 28px 0 14px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--perla);
  }

  /* ====== COOKIE DEL MES ====== */
  .cdm {
    background: linear-gradient(160deg, var(--navy) 0%, var(--petrol) 100%);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    margin-bottom: 8px;
    box-shadow: 0 14px 30px -12px rgba(11,35,69,.5);
  }
  .cdm-badge {
    position: absolute;
    top: 14px; left: 14px;
    background: var(--mostaza);
    color: var(--navy-deep);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 100px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .cdm-badge .pulse {
    width: 6px; height: 6px;
    background: var(--navy-deep);
    border-radius: 50%;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(1.5); }
  }
  .cdm-photo {
    width: 100%;
    aspect-ratio: 16/11;
    object-fit: cover;
    display: block;
  }
  .cdm-body { padding: 18px 20px 20px; }
  .cdm-body h3 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--cream);
    line-height: 1.1;
  }
  .cdm-body .quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--mostaza);
    margin: 8px 0 14px;
  }
  .cdm-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .cdm-price {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--cream);
  }
  .cdm-btn {
    background: var(--mostaza);
    color: var(--navy-deep);
    border: none;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 100px;
    cursor: pointer;
    letter-spacing: .3px;
    transition: transform .12s, filter .12s;
  }
  .cdm-btn:active { transform: scale(.96); }
  .cdm-btn:hover { filter: brightness(1.08); }
  .cdm-btn.in-cart { background: var(--oliva); color: #fff; }

  /* ====== BOX CARDS ====== */
  .box-card {
    background: var(--navy);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .box-card::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(215,161,58,.18), transparent 70%);
  }
  .box-photo {
    width: 92px; height: 92px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .box-info { flex: 1; min-width: 0; }
  .box-info h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--cream);
    line-height: 1.15;
  }
  .box-info .box-desc {
    font-size: 12.5px;
    color: rgba(243,235,221,.7);
    margin-top: 3px;
  }
  .box-info .box-price {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--mostaza);
    margin-top: 5px;
  }
  .box-tag {
    display: inline-block;
    background: rgba(215,161,58,.2);
    color: var(--mostaza);
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
    margin-top: 6px;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .qty-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    transition: transform .1s;
  }
  .qty-btn:active { transform: scale(.9); }
  .qty-num {
    min-width: 26px;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
  }
  .box-card .qty-btn { border-color: rgba(243,235,221,.5); color: var(--cream); }
  .box-card .qty-num { color: var(--cream); }

  /* ====== COOKIE CARDS ====== */
  .cookie-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .cookie-card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 22px -14px rgba(11,35,69,.4);
    border: 1px solid var(--cream-2);
  }
  .cookie-card.agotada { opacity: .72; }
  .cookie-photo-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    background: var(--cream-2);
  }
  .cookie-photo {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .4s ease;
  }
  .cookie-card:hover .cookie-photo { transform: scale(1.04); }
  .cookie-flag {
    position: absolute;
    top: 12px; left: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 11px;
    border-radius: 100px;
  }
  .cookie-flag.nueva { background: var(--oliva); color: #fff; }
  .cookie-flag.poco { background: var(--bordo); color: #fff; }
  .cookie-flag.agotado { background: var(--terracota); color: #fff; }
  .cookie-body { padding: 16px 18px 18px; }
  .cookie-body h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--navy);
    line-height: 1.12;
  }
  .cookie-desc {
    font-size: 13.5px;
    color: var(--muted);
    margin: 7px 0 0;
    min-height: 38px;
  }
  .cookie-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 12px;
  }
  .cookie-price {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--petrol);
  }
  .cookie-card .qty-btn { border-color: var(--cream-2); color: var(--navy); }
  .avisar-btn {
    width: 100%;
    margin-top: 12px;
    background: transparent;
    border: 1.5px solid var(--terracota);
    color: var(--terracota);
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    padding: 12px;
    border-radius: 100px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .avisar-btn:active { transform: scale(.98); }

  /* ====== GENERIC SECTIONS ====== */
  .panel {
    background: #fff;
    border: 1px solid var(--cream-2);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .panel label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 14px;
    font-weight: 500;
  }
  .panel label:first-child { margin-top: 0; }
  input, textarea {
    width: 100%;
    padding: 13px;
    border: 1px solid var(--cream-2);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    background: var(--cream);
    color: var(--petrol);
  }
  input:focus, textarea:focus { outline: none; border-color: var(--navy); background: #fff; }

  /* ====== PILL SELECTORS ====== */
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    flex: 1;
    min-width: 90px;
    padding: 13px 10px;
    border: 1.5px solid var(--cream-2);
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
    text-align: center;
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--petrol);
    transition: all .14s;
  }
  .pill.act { background: var(--navy); color: #fff; border-color: var(--navy); }
  .pill.dis {
    opacity: .42;
    text-decoration: line-through;
    cursor: not-allowed;
  }
  .pill .sub { display: block; font-size: 11px; opacity: .7; margin-top: 2px; }

  .info-box {
    background: var(--cream);
    border-left: 3px solid var(--navy);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--petrol);
  }
  .info-box b { color: var(--navy); }
  .warn-box {
    background: #fdf3d6;
    border: 1px solid var(--mostaza);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    color: #7a5a13;
    margin-bottom: 10px;
  }

  /* ====== EVENTOS / NOVEDADES ====== */
  .feature {
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .feature h3 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 21px;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .feature p { font-size: 14px; line-height: 1.5; }
  .feature .feat-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 14px;
    padding: 12px 20px;
    border-radius: 100px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    border: none;
    cursor: pointer;
  }
  .feature.eventos {
    background: linear-gradient(150deg, var(--bordo), #5e1622);
    color: var(--cream);
  }
  .feature.eventos .feat-btn { background: var(--mostaza); color: var(--navy-deep); }
  .feature.novedades {
    background: var(--lavanda);
    color: var(--navy-deep);
  }
  .nov-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 9px 0;
    border-bottom: 1px solid rgba(11,35,69,.12);
  }
  .nov-item:last-child { border-bottom: none; }
  .nov-emoji { font-size: 19px; line-height: 1.3; }
  .nov-item .nov-t { font-weight: 600; font-size: 14.5px; }
  .nov-item .nov-d { font-size: 12.5px; opacity: .75; }
  .feature.contacto {
    background: var(--navy);
    color: var(--cream);
    text-align: center;
  }
  .feature.contacto .feat-btn {
    background: #25D366; color: #fff;
    margin: 14px auto 0;
  }

  /* ====== RESUMEN / CTA ====== */
  .resumen-list { margin-bottom: 8px; }
  .resumen-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px dashed var(--cream-2);
  }
  .resumen-row.total {
    border-bottom: none;
    border-top: 2px solid var(--navy);
    margin-top: 6px;
    padding-top: 10px;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--navy);
  }
  .resumen-empty {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-family: 'Fraunces', serif;
    padding: 14px;
  }
  .cta {
    width: 100%;
    padding: 17px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: .5px;
  }
  .cta:disabled { opacity: .45; cursor: not-allowed; }
  .cta:not(:disabled):active { transform: scale(.99); }

  /* ====== MODAL BOX SABORES ====== */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(11,35,69,.6);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--cream);
    width: 100%;
    max-width: 560px;
    border-radius: 22px 22px 0 0;
    padding: 22px 18px;
    max-height: 88vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 21px;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .modal .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .sabor-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: #fff;
    border: 1px solid var(--cream-2);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .sabor-row img {
    width: 48px; height: 48px;
    border-radius: 8px;
    object-fit: cover;
  }
  .sabor-row .sabor-name { flex: 1; font-size: 14px; font-weight: 500; }
  .modal-counter {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    color: var(--navy);
    margin: 10px 0;
  }
  .modal-counter b { font-size: 19px; }
  .toast {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy-deep);
    color: var(--cream);
    padding: 13px 22px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    z-index: 200;
    transition: transform .3s;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading { text-align:center; padding:60px 20px; color:var(--muted); font-family:'Fraunces',serif; font-style:italic; }
</style>
</head>

function driveImg(idOrUrl){
  if(!idOrUrl) return "";
  if(idOrUrl.indexOf("http") === 0){
    var m = idOrUrl.match(/[-\w]{25,}/);
    if(m) return "https://drive.google.com/thumbnail?id=" + m[0] + "&sz=w1200";
    return idOrUrl;
  }
  return "https://drive.google.com/thumbnail?id=" + idOrUrl + "&sz=w1200";
}

  div.innerHTML =
    '<img class="box-photo" src="' + driveImg(box.foto) + '" alt="Box" onerror="this.style.visibility=\'hidden\'">' +
    '<div class="box-info">' +

function cambiarBox(tipo, delta){
  if(delta > 0){
    // Abrir modal para elegir sabores
    modalBoxTarget = tipo;
    abrirModalBox(tipo);
  } else {
    if(tipo === "box" && boxQty > 0){
      boxQty--;
      // quitar los sabores de la última box (proporcional simple: limpiamos todo si llega a 0)
      if(boxQty === 0) boxFill = {};
    }
    if(tipo === "box2" && box2Qty > 0){
      box2Qty--;
      if(box2Qty === 0) box2Fill = {};
    }
    $(tipo + "-num").textContent = tipo === "box" ? boxQty : box2Qty;
    renderResumen();
  }
}

/* ---- MODAL BOX ---- */
function abrirModalBox(tipo){
  var box = tipo === "box" ? CFG.box : CFG.box2;
  $("modalBoxTitle").textContent = "Armá tu " + box.nombre;
  $("modalBoxSub").textContent = "Elegí " + box.cant + " cookies (podés repetir sabores)";
  $("modalBoxMax").textContent = box.cant;
  var tempFill = {};
  CFG.productos.forEach(function(p){ tempFill[p.id] = 0; });
  window._tempFill = tempFill;
  window._tempBox = box;
  window._tempTipo = tipo;

  var list = $("modalBoxList");
  list.innerHTML = "";
  CFG.productos.forEach(function(p){
    if(!p.activo) return;
    var row = document.createElement("div");
    row.className = "sabor-row";
    row.innerHTML =
      '<img src="' + driveImg(p.foto) + '" onerror="this.style.visibility=\'hidden\'">' +
      '<span class="sabor-name">' + esc(p.nombre) + '</span>' +
      '<div class="qty-ctrl">' +
        '<button class="qty-btn" onclick="modalSabor(\'' + p.id + '\',-1)">−</button>' +
        '<span class="qty-num" id="msab-' + p.id + '">0</span>' +
        '<button class="qty-btn" onclick="modalSabor(\'' + p.id + '\',1)">+</button>' +
      '</div>';
    list.appendChild(row);
  });
  $("modalBoxCount").textContent = "0";
  $("modalBox").classList.add("show");
}

function modalSabor(id, delta){
  var box = window._tempBox;
  var fill = window._tempFill;
  var totalActual = 0;
  Object.keys(fill).forEach(function(k){ totalActual += fill[k]; });
  if(delta > 0){
    if(totalActual >= box.cant){ toast("Ya elegiste " + box.cant + " cookies"); return; }
    // chequear stock
    var p = CFG.productos.find(function(x){ return x.id === id; });
    var usado = (qty[id]||0) + (boxFill[id]||0) + (box2Fill[id]||0) + fill[id];
    if(usado >= (parseInt(p.stock)||0)){ toast("Sin stock de " + p.nombre); return; }
    fill[id]++;
  } else {
    if(fill[id] > 0) fill[id]--;
  }
  $("msab-" + id).textContent = fill[id];
  var nuevoTotal = 0;
  Object.keys(fill).forEach(function(k){ nuevoTotal += fill[k]; });
  $("modalBoxCount").textContent = nuevoTotal;
}

$("modalBoxConfirm").onclick = function(){
  var box = window._tempBox;
  var fill = window._tempFill;
  var tipo = window._tempTipo;
  var total = 0;
  Object.keys(fill).forEach(function(k){ total += fill[k]; });
  if(total !== box.cant){
    toast("Tenés que elegir exactamente " + box.cant + " cookies");
    return;
  }
  // Sumar la box
  if(tipo === "box"){
    boxQty++;
    Object.keys(fill).forEach(function(k){ boxFill[k] = (boxFill[k]||0) + fill[k]; });
    $("box-num").textContent = boxQty;
  } else {
    box2Qty++;
    Object.keys(fill).forEach(function(k){ box2Fill[k] = (box2Fill[k]||0) + fill[k]; });
    $("box2-num").textContent = box2Qty;
  }
  cerrarModalBox();
  renderResumen();
  toast("Box agregada ✓");
};

function cerrarModalBox(){ $("modalBox").classList.remove("show"); }

/* ---- COOKIE CARD ---- */
function renderCookieCard(p){
  var div = document.createElement("div");
  div.className = "cookie-card";
  div.id = "card-" + p.id;
  var stock = parseInt(p.stock) || 0;
  var agotada = stock <= 0;
  if(agotada) div.classList.add("agotada");
  var esNueva = (p.descripcion||"").toUpperCase().indexOf("NUEVA") === 0;

  var flag = "";
  if(agotada) flag = '<div class="cookie-flag agotado">Agotada</div>';
  else if(stock <= 3) flag = '<div class="cookie-flag poco">Últimas ' + stock + '</div>';
  else if(esNueva) flag = '<div class="cookie-flag nueva">Nueva</div>';

  var desc = (p.descripcion||"").replace(/^NUEVA\s*[-–]\s*/i, "");

  var foot = agotada
    ? '<button class="avisar-btn" onclick="avisarStock(\'' + p.id + '\')">🔔 Avisame cuando vuelva</button>'
    : '<div class="cookie-foot">' +
        '<div class="cookie-price">' + fmt(p.precio) + '</div>' +
        '<div class="qty-ctrl">' +
          '<button class="qty-btn" onclick="cambiarCookie(\'' + p.id + '\',-1)">−</button>' +
          '<span class="qty-num" id="qn-' + p.id + '">' + (qty[p.id]||0) + '</span>' +
          '<button class="qty-btn" onclick="cambiarCookie(\'' + p.id + '\',1)">+</button>' +
        '</div>' +
      '</div>';

  div.innerHTML =
    '<div class="cookie-photo-wrap">' +
      flag +
      '<img class="cookie-photo" src="' + driveImg(p.foto) + '" alt="' + esc(p.nombre) + '" onerror="this.style.opacity=\'.3\'">' +
    '</div>' +
    '<div class="cookie-body">' +
      '<h3>' + esc(p.nombre) + '</h3>' +
      '<p class="cookie-desc">' + esc(desc) + '</p>' +
      foot +
    '</div>';
  return div;
}

function disponible(id){
  var p = CFG.productos.find(function(x){ return x.id === id; });
  var stock = parseInt(p.stock) || 0;
  return stock - (boxFill[id]||0) - (box2Fill[id]||0);
}

function cambiarCookie(id, delta){
  var p = CFG.productos.find(function(x){ return x.id === id; });
  if(delta > 0){
    if((qty[id]||0) >= disponible(id)){
      toast("Sin más stock de " + p.nombre);
      return;
    }
    qty[id] = (qty[id]||0) + 1;
  } else {
    if((qty[id]||0) > 0) qty[id]--;
  }
  actualizarCard(id);
  renderResumen();
}

function actualizarCard(id){
  var el = $("qn-" + id);
  if(el) el.textContent = qty[id] || 0;
}

/* ---- DÍAS (con corte de horas) ---- */
function renderDias(){
  var wrap = $("dia-section");
  if(!wrap) return;
  if(!CFG.diasEntrega.length){ wrap.innerHTML = ""; return; }

  wrap.innerHTML = "";
  wrap.appendChild(seccionTitulo("Día de entrega"));

  var now = new Date();
  var minH = CFG.horasCorte || 24;

  function parsearFechaDia(d){
    var mFecha = (d.label||"").match(/(\d{1,2})\/(\d{1,2})/);
    if(!mFecha) return null;
    var dia = parseInt(mFecha[1],10);
    var mes = parseInt(mFecha[2],10) - 1;
    var hStr = (d.horario || (d.franjas && d.franjas[0]) || "15:00");
    var mHora = hStr.match(/(\d{1,2})[:.]?(\d{0,2})/);
    var hora = mHora ? parseInt(mHora[1],10) : 15;
    var min = (mHora && mHora[2]) ? parseInt(mHora[2],10) : 0;
    var anio = now.getFullYear();
    var fecha = new Date(anio, mes, dia, hora, min, 0);
    if(fecha < now && (now.getMonth() - mes > 6)){
      fecha = new Date(anio+1, mes, dia, hora, min, 0);
    }
    return fecha;
  }

  disp = CFG.diasEntrega.map(function(d){
    var fecha = parsearFechaDia(d);
    if(!fecha) return { dia:d, disponible:true };
    var horas = (fecha - now) / 3600000;
    return { dia:d, disponible: horas >= minH, fecha:fecha };
  });

  var disponibles = disp.filter(function(x){ return x.disponible; });

  var pillRow = document.createElement("div");
  pillRow.className = "pill-row";

  if(!disponibles.length){
    var w = document.createElement("div");
    w.className = "warn-box";
    w.textContent = "⚠ Los pedidos para los días disponibles ya cerraron (mínimo " + minH + "hs de anticipación). Volvé cuando carguemos nuevas fechas.";
    wrap.appendChild(w);
  }

  disp.forEach(function(item){
    var d = item.dia;
    var btn = document.createElement("button");
    if(item.disponible){
      btn.className = "pill";
      btn.id = "dia-" + d.id;
      btn.textContent = d.label;
      btn.onclick = (function(id){ return function(){ setDia(id); }; })(d.id);
    } else {
      btn.className = "pill dis";
      btn.textContent = d.label + " · cerrado";
      btn.onclick = function(){
        toast("Ese día ya no se puede pedir. Mínimo " + minH + "hs de anticipación.");
      };
    }
    pillRow.appendChild(btn);
  });
  wrap.appendChild(pillRow);

  if(disponibles.length){
    diaId = disponibles[0].dia.id;
    var b = $("dia-" + diaId);
    if(b) b.classList.add("act");
    renderFranjas();
  } else {
    diaId = null;
    $("franja-section").innerHTML = "";
  }
}

function setDia(id){
  diaId = id;
  disp.forEach(function(item){
    var d = item.dia;
    var b = $("dia-" + d.id);
    if(b && item.disponible) b.classList.toggle("act", d.id === id);
  });
  renderFranjas();
}

function renderFranjas(){
  var wrap = $("franja-section");
  if(!wrap) return;
  wrap.innerHTML = "";
  var d = CFG.diasEntrega.find(function(x){ return x.id === diaId; });
  var franjas = [];
  if(d && d.franjas && d.franjas.length) franjas = d.franjas;
  else if(d && d.horario) franjas = [d.horario];
  else franjas = CFG.franjasDefault || [];

  if(!franjas.length){ franja = null; return; }

  wrap.appendChild(seccionTitulo("Horario"));
  var row = document.createElement("div");
  row.className = "pill-row";
  franjas.forEach(function(f, i){
    var btn = document.createElement("button");
    btn.className = "pill" + (i === 0 ? " act" : "");
    btn.textContent = f;
    btn.onclick = (function(val, elBtn){
      return function(){
        row.querySelectorAll(".pill").forEach(function(x){ x.classList.remove("act"); });
        elBtn.classList.add("act");
        franja = val;
      };
    })(f, btn);
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  franja = franjas[0];
}

  p.className = "pill-row";
  p.innerHTML =
    '<button class="pill" id="pill-transf" onclick="setPago(\'transferencia\')">💳 Transferencia</button>' +
    '<button class="pill" id="pill-efec" onclick="setPago(\'efectivo\')">💵 Efectivo</button>';
  div.appendChild(p);
  var info = document.createElement("div");
  info.id = "pago-info";
  div.appendChild(info);
  return div;
}

function setPago(t){
  pago = t;
  $("pill-transf").classList.toggle("act", t === "transferencia");
  $("pill-efec").classList.toggle("act", t === "efectivo");
  var info = $("pago-info");
  if(t === "transferencia"){
    info.innerHTML =
      '<div class="info-box">' +
        '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Transferí al confirmar</div>' +
        '<div style="font-family:\'Fraunces\',serif;font-weight:700;font-size:20px;color:var(--navy);margin-top:2px">' + esc(CFG.alias) + '</div>' +
        '<div style="font-size:13px;color:var(--muted)">' + esc(CFG.banco) + '</div>' +
        '<div style="margin-top:8px;font-size:13px">' + esc(CFG.msgTransferencia) + '</div>' +
      '</div>';
  } else {
    info.innerHTML = '<div class="info-box">' + esc(CFG.msgEfectivo) + '</div>';
  }
  renderResumen();
}

/* ---- RESUMEN ---- */
function calcularTotales(){
  var sueltas = 0, items = [];
  CFG.productos.forEach(function(p){
    if(qty[p.id] > 0){
      sueltas += qty[p.id] * p.precio;
      items.push({ nombre: p.nombre, cant: qty[p.id], tipo:"suelta" });
    }
  });
  var totalBoxes = boxQty * (CFG.box.precio||0) + box2Qty * (CFG.box2.precio||0);
  var hayBox = (boxQty + box2Qty) > 0;
  // Descuento en sueltas si hay box
  var pct = CFG.box.pctSueltas || 0;
  var descuento = 0;
  if(hayBox && pct > 0){
    descuento = sueltas * (pct/100);
  }
  var total = totalBoxes + sueltas - descuento;
  return {
    sueltas: sueltas,
    totalBoxes: totalBoxes,
    descuento: descuento,
    total: total,
    items: items,
    hayBox: hayBox
  };
}

function renderResumen(){
  var wrap = $("resumen-section");
  if(!wrap) return;
  var t = calcularTotales();
  var hayAlgo = t.hayBox || t.items.length > 0;

  var html = '<div class="panel">';
  if(!hayAlgo){
    html += '<div class="resumen-empty">Todavía no elegiste cookies</div>';
  } else {
    html += '<div class="resumen-list">';
    if(boxQty > 0){
      html += resumenRow(CFG.box.nombre + " ×" + boxQty, fmt(boxQty*CFG.box.precio));
      html += boxFillDetalle(boxFill);
    }
    if(box2Qty > 0){
      html += resumenRow(CFG.box2.nombre + " ×" + box2Qty, fmt(box2Qty*CFG.box2.precio));
      html += boxFillDetalle(box2Fill);
    }
    t.items.forEach(function(it){
      html += resumenRow(it.nombre + " ×" + it.cant, "");
    });
    if(t.descuento > 0){
      html += resumenRow("Descuento en sueltas (" + CFG.box.pctSueltas + "%)", "−" + fmt(t.descuento));
    }
    html += '</div>';
    html += '<div class="resumen-row total"><span>Total</span><span>' + fmt(t.total) + '</span></div>';
    if(ent === "envio"){
      html += '<div style="font-size:12px;color:var(--muted);margin-top:8px">+ Envío ' + fmt(CFG.costoEnvio) + ' (se abona a la mensajería al recibir)</div>';
    }
  }
  html += '</div>';
  wrap.innerHTML = html;

  // habilitar/deshabilitar CTA
  var btn = $("btnConfirmar");
  if(btn) btn.disabled = !hayAlgo;
}

function resumenRow(label, val){
  return '<div class="resumen-row"><span>' + esc(label) + '</span><span>' + val + '</span></div>';
}
function boxFillDetalle(fill){
  var partes = [];
  Object.keys(fill).forEach(function(k){
    if(fill[k] > 0){
      var p = CFG.productos.find(function(x){ return x.id === k; });
      if(p) partes.push(fill[k] + " " + p.nombre);
    }
  });
  if(!partes.length) return "";
  return '<div style="font-size:11.5px;color:var(--muted);padding:2px 0 6px">↳ ' + esc(partes.join(" · ")) + '</div>';
}

/* ---- CONFIRMAR PEDIDO ---- */
function confirmarPedido(){
  var t = calcularTotales();
  if(!t.hayBox && t.items.length === 0){ toast("Elegí al menos una cookie"); return; }

  var nombre = $("in-nombre").value.trim();
  var tel = $("in-tel").value.trim();
  if(!nombre){ toast("Completá tu nombre"); return; }
  if(!tel){ toast("Completá tu teléfono"); return; }
  if(!ent){ toast("Elegí envío o retiro"); return; }
  if(ent === "envio" && !$("in-dir").value.trim()){ toast("Completá la dirección"); return; }
  if(!diaId){ toast("Elegí un día de entrega"); return; }
  if(!pago){ toast("Elegí la forma de pago"); return; }

  var dia = CFG.diasEntrega.find(function(d){ return d.id === diaId; });

  // Construir texto de cookies
  var cookiesTxt = [];
  if(boxQty > 0){
    var bf = [];
    Object.keys(boxFill).forEach(function(k){
      if(boxFill[k] > 0){
        var p = CFG.productos.find(function(x){ return x.id === k; });
        if(p) bf.push(boxFill[k] + " " + p.nombre);
      }
    });
    cookiesTxt.push(CFG.box.nombre + " x" + boxQty + " (" + bf.join(" + ") + ")");
  }
  if(box2Qty > 0){
    var bf2 = [];
    Object.keys(box2Fill).forEach(function(k){
      if(box2Fill[k] > 0){
        var p = CFG.productos.find(function(x){ return x.id === k; });
        if(p) bf2.push(box2Fill[k] + " " + p.nombre);
      }
    });
    cookiesTxt.push(CFG.box2.nombre + " x" + box2Qty + " (" + bf2.join(" + ") + ")");
  }
  CFG.productos.forEach(function(p){
    if(qty[p.id] > 0) cookiesTxt.push(p.nombre + " x" + qty[p.id]);
  });

  // Unidades totales
  var unidades = boxQty*CFG.box.cant + box2Qty*CFG.box2.cant;
  CFG.productos.forEach(function(p){ unidades += qty[p.id]||0; });

  // Stock changes
  var stockChanges = {};
  CFG.productos.forEach(function(p){
    var usado = (qty[p.id]||0) + (boxFill[p.id]||0) + (box2Fill[p.id]||0);
    if(usado > 0) stockChanges[p.id] = usado;
  });

  var packTxt = [];
  if(boxQty > 0) packTxt.push("Box4 x" + boxQty);
  if(box2Qty > 0) packTxt.push("Box6 x" + box2Qty);
  if(t.descuento > 0) packTxt.push(CFG.box.pctSueltas + "% sueltas");

  var payload = {
    tipo: "pedido",
    fecha: formatHoy(),
    hora: formatHora(),
    nro_orden: "",
    nombre: nombre,
    telefono: tel,
    email: $("in-email").value.trim(),
    cookies: cookiesTxt.join(" | "),
    unidades: unidades,
    pack: packTxt.length ? packTxt.join(", ") : "No",
    subtotal: t.total,
    entrega: ent === "envio" ? "Envio" : "Retiro",
    direccion: ent === "envio" ? $("in-dir").value.trim() : "Retiro en domicilio",
    dia_entrega: dia ? dia.label : "",
    horario: franja || "",
    costo_envio: ent === "envio" ? CFG.costoEnvio : 0,
    total: t.total,
    pago: pago === "transferencia" ? "Transferencia" : "Efectivo",
    notas: $("in-notas").value.trim(),
    estado: "Pendiente",
    stockChanges: stockChanges
  };

  var btn = $("btnConfirmar");
  btn.disabled = true;
  btn.textContent = "Enviando…";

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  }).then(function(){
    mostrarConfirmacion(payload);
  }).catch(function(){
    mostrarConfirmacion(payload);
  });
}

function mostrarConfirmacion(payload){
  var app = $("app");
  var wspMsg = "Hola Blu Bakery! Acabo de hacer un pedido 🍪\n\n" +
    "Nombre: " + payload.nombre + "\n" +
    "Pedido: " + payload.cookies + "\n" +
    "Total: " + fmt(payload.total) + "\n" +
    "Entrega: " + payload.entrega + " · " + payload.dia_entrega + " " + payload.horario + "\n" +
    "Pago: " + payload.pago +
    (payload.pago === "Transferencia" ? "\n\n(Adjunto el comprobante)" : "");
  app.innerHTML =
    '<div class="panel" style="text-align:center;padding:36px 22px">' +
      '<div style="font-size:46px">🍪</div>' +
      '<h2 style="font-family:\'Fraunces\',serif;color:var(--navy);font-size:26px;margin:10px 0 6px">¡Pedido recibido!</h2>' +
      '<p style="color:var(--muted);font-size:14px;margin-bottom:8px">Gracias ' + esc(payload.nombre) + ' 💛</p>' +
      '<p style="font-size:14px">Para confirmar tu pedido' +
        (payload.pago === "Transferencia" ? ' y enviar el comprobante' : '') +
        ', escribinos por WhatsApp:</p>' +
      '<a class="feat-btn" style="background:#25D366;color:#fff;margin:16px auto 0" href="https://wa.me/' + WSP_NUMERO + '?text=' + encodeURIComponent(wspMsg) + '" target="_blank" rel="noopener">💬 Confirmar por WhatsApp</a>' +
      '<div style="margin-top:20px"><a href="#" onclick="location.reload()" style="color:var(--navy);font-size:13px">Hacer otro pedido</a></div>' +
    '</div>';
  window.scrollTo(0,0);
}

/* ---- HELPERS ---- */
function formatHoy(){
  var d = new Date();
  return d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
}
function formatHora(){
  var d = new Date();
  var h = d.getHours();
  var m = ("0"+d.getMinutes()).slice(-2);
  var ap = h >= 12 ? "p. m." : "a. m.";
  var h12 = h % 12; if(h12 === 0) h12 = 12;
  return ("0"+h12).slice(-2) + ":" + m + " " + ap;
}
function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
  });
}
var toastTimer;
function toast(msg){
  var el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2600);
}
